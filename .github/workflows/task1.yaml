name: build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Install backend dependencies
        run: |
          cd backend/form
          npm ci

      - name: Start backend
        run: |
          cd backend/form
          npm run start:dev &
        env:
          JWT_SECRET: secret
          JWT_EXPIRES: 30d
          MONGODB_URI: mongodb://127.0.0.1:27017/form

      - name: Wait for backend
        run: wait-on http://localhost:4000

      - name: Seed test user
        run: |
          curl -X POST http://127.0.0.1:4000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"admin21@example.com","password":"test1234","role":"admin"}' || true
          sleep 2

      - name: Test login API
        run: |
          curl -v -X POST http://127.0.0.1:4000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin21@example.com","password":"test1234"}'

      - name: Install frontend dependencies
        run: |
          cd frontend/my-next-app
          npm ci

      - name: Install Cypress
        run: |
          cd frontend/my-next-app
          npm install cypress --save-dev

      - name: Start frontend
        run: |
          cd frontend/my-next-app
          npm run dev &
        shell: bash

      - name: Wait for frontend
        run: npx wait-on http://localhost:3000

      - name: Run Cypress tests
        run: |
          cd frontend/my-next-app
          npx cypress run


  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: 99dcc7e14b1a28f2e1dc9f3fa7cae5175dd9fb3a
