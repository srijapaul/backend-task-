name: Cypress test
on:
  push:
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:4.4
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Install backend dependencies
        run: |
          cd backend/form
          npm ci

      - name: Start backend
        run: |
          cd backend/form
          npm run start:dev &
        env:
          MONGODB_URI: mongodb://localhost:27017/form

      - name: Wait for backend
        run: wait-on http://localhost:4000
      - name: Print backend logs
        run: |
          cat backend/form/logs/*.log || true

      - name: Seed test user
        run: |
          curl -X POST http://127.0.0.1:4000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","password":"test1234","role":"admin"}' || true
            sleep 2
      - name: Test login API
        run: |
            curl -v -X POST http://127.0.0.1:4000/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@example.com","password":"test1234"}'     

      - name: Install frontend dependencies
        run: |
          cd frontend/my-next-app
          npm ci

      - name: Install Cypress
        run: |
          cd frontend/my-next-app
          npm install cypress --save-dev

      - name: Start frontend
        run: |
          cd frontend/my-next-app
          npm run dev &
        shell: bash

      - name: Wait for frontend
        run: wait-on http://localhost:3000

      - name: Run Cypress tests
        run: |
          cd frontend/my-next-app
          npx cypress run
